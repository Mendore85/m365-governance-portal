<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Azure Naming Convention Generator
    </title>

    <link rel="stylesheet"
          href="../assets/global.css">

</head>

<body>

    <div id="navbar"></div>

    <div class="container">

        <h1>
            Azure Naming Generator
        </h1>

        <div class="form-group">

            <label>
                Application Name
            </label>

            <input
                type="text"
                id="application"
                placeholder="payroll">

        </div>

        <div class="form-group">

            <label>
                Environment
            </label>

            <select id="environment">

                <option value="dev">
                    Dev
                </option>

                <option value="test">
                    Test
                </option>

                <option value="prod">
                    Prod
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Region
            </label>

            <select id="region">

                <option value="uks">
                    UK South
                </option>

                <option value="ukw">
                    UK West
                </option>

                <option value="weu">
                    West Europe
                </option>

                <option value="eus">
                    East US
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Resource Type
            </label>

            <select id="resourceType">

                <option value="st">
                    Storage Account
                </option>

                <option value="kv">
                    Key Vault
                </option>

                <option value="app">
                    App Service
                </option>

                <option value="rg">
                    Resource Group
                </option>

                <option value="vm">
                    Virtual Machine
                </option>

            </select>

        </div>

        <button onclick="generateName()">

            Generate Name

        </button>

        <div class="output">

            <h3>
                Generated Name
            </h3>

            <input
                type="text"
                id="result"
                readonly>

            <button onclick="copyName()">

                Copy Name

            </button>

        </div>

        <div class="history">

            <h3>
                Generated Names
            </h3>

            <ul id="historyList"></ul>

            <button onclick="clearHistory()">

                Clear History

            </button>

            <button onclick="exportCSV()">

                Export CSV

            </button>

        </div>

    </div>

    <script src="js/app.js"></script>

    <script src="../assets/shared.js"></script>

</body>

</html>
