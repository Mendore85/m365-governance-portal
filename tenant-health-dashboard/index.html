<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        M365 Tenant Health Dashboard
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div class="container">

        <div class="toolbar">

            <button id="themeToggle">
                🌙
            </button>

        </div>

        <a class="back-button"
         href="../index.html">

          ← Back to Portal

          </a>

        <h1>
            M365 Tenant Health Dashboard
        </h1>

        <div class="dashboard">

            <div class="card healthy">

                <h2>
                    Exchange Online
                </h2>

                <p>
                    Healthy
                </p>

            </div>

            <div class="card warning">

                <h2>
                    SharePoint Online
                </h2>

                <p>
                    Warning
                </p>

            </div>

            <div class="card healthy">

                <h2>
                    Teams
                </h2>

                <p>
                    Healthy
                </p>

            </div>

            <div class="card healthy">

                <h2>
                    Entra ID
                </h2>

                <p>
                    Healthy
                </p>

            </div>

        </div>

        <div class="summary">

            <div class="summary-card">

                <h3>
                    License Usage
                </h3>

                <p>
                    82%
                </p>

            </div>

            <div class="summary-card">

                <h3>
                    Guest Access Risk
                </h3>

                <p>
                    High
                </p>

            </div>

            <div class="summary-card">

                <h3>
                    Critical Alerts
                </h3>

                <p>
                    2
                </p>

            </div>

        </div>

    </div>

    <script src="js/app.js"></script>

</body>

</html>
