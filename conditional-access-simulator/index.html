<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Conditional Access Simulator
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div id="navbar"></div>

    <div class="container">

        <h1>
            Conditional Access Simulator
        </h1>

        <div class="form-group">

            <label>
                Location
            </label>

            <select id="location">

                <option value="Nigeria">
                    Nigeria
                </option>

                <option value="United States">
                    United States
                </option>

                <option value="Russia">
                    Russia
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Device Type
            </label>

            <select id="device">

                <option value="Managed">
                    Managed
                </option>

                <option value="Personal">
                    Personal
                </option>

            </select>

        </div>

        <div class="form-group">

            <label>
                Application
            </label>

            <select id="application">

                <option value="Exchange Online">
                    Exchange Online
                </option>

                <option value="SharePoint Online">
                    SharePoint Online
                </option>

                <option value="Teams">
                    Teams
                </option>

            </select>

        </div>

        <button onclick="evaluateAccess()">
            Evaluate Access
        </button>

        <div id="results"></div>

    </div>

    <script src="js/app.js"></script>

    <script>

</script>

</body>

</html>
