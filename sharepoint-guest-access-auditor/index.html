<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        SharePoint Guest Access Auditor
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div id="navbar"></div>

    <div class="container">

        <div class="toolbar">

            <button id="themeToggle">
                🌙
            </button>

        </div>

        <h1>
            SharePoint Guest Access Auditor
        </h1>

        <textarea
            id="configInput"
            placeholder="Paste SharePoint sharing configuration JSON">
        </textarea>

        <button onclick="auditSharing()">
            Audit Configuration
        </button>

        <div id="results"></div>

    </div>

    <script src="js/app.js"></script>

    <script>

fetch("../components/navbar.html")

.then(response => response.text())

.then(data => {

    document.getElementById(
        "navbar"
    ).innerHTML = data;

});

</script>

</body>

</html>
