<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Exchange Mail Flow Analyzer
    </title>

    <link rel="stylesheet"
          href="css/style.css">

</head>

<body>

    <div id="navbar"></div>

    <div class="container">

        <h1>
            Exchange Mail Flow Analyzer
        </h1>

        <textarea
            id="errorInput"
            placeholder="Enter Exchange error message or SMTP code">
        </textarea>

        <button onclick="analyzeMailFlow()">
            Analyze Issue
        </button>

        <div id="results"></div>

    </div>

    <script src="js/app.js"></script>
<script>

fetch("../components/navbar.html")

.then(response => response.text())

.then(data => {

    document.getElementById(
        "navbar"
    ).innerHTML = data;

});

</script>

</body>

</html>
